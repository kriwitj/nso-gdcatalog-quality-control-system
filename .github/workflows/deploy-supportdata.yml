name: Deploy SupportData

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-supportdata.yml"

concurrency:
  group: deploy-supportdata
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # (optional) login ถ้าใช้ private registry เช่น GHCR
      # - name: Login to GHCR
      #   run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy with Docker Compose
        run: |
          cd /opt/apps/supportdata
          docker compose -f docker-compose.prod.yml up -d --build --scale worker=2

      - name: Cleanup unused images
        run: docker image prune -f