version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ogd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ogd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ogdpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ogdquality}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ogd} -d ${POSTGRES_DB:-ogdquality}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ogd_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ogd_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ogd}:${POSTGRES_PASSWORD:-ogdpassword}@postgres:5432/${POSTGRES_DB:-ogdquality}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      CKAN_BASE_URL: ${CKAN_BASE_URL:-https://saraburi.gdcatalog.go.th}
      CKAN_API_KEY: ${CKAN_API_KEY:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme_access_secret_32chars_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_32chars_here}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/src
    command: sh -c "npx prisma migrate deploy && npm run dev"

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: ogd_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ogd}:${POSTGRES_PASSWORD:-ogdpassword}@postgres:5432/${POSTGRES_DB:-ogdquality}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      CKAN_BASE_URL: ${CKAN_BASE_URL:-https://saraburi.gdcatalog.go.th}
      CKAN_API_KEY: ${CKAN_API_KEY:-}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-100}
      MAX_ROWS: ${MAX_ROWS:-200000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      DOWNLOAD_TIMEOUT: ${DOWNLOAD_TIMEOUT:-60}
    volumes:
      - tmpfiles:/tmp/ogd_files

  nginx:
    image: nginx:alpine
    container_name: ogd_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
  redisdata:
  tmpfiles:
