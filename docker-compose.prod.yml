version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CKAN_BASE_URL: ${CKAN_BASE_URL}
      CKAN_API_KEY: ${CKAN_API_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme_access_secret_32chars_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_32chars_here}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: 3000
    command: sh -c "npx prisma migrate deploy && npm run start"
    networks:
      - internal
      - proxy_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_net
      - traefik.http.routers.supportdata.rule=Host(`supportdata.nso.go.th`)
      - traefik.http.routers.supportdata.entrypoints=websecure
      - traefik.http.routers.supportdata.tls=true
      - traefik.http.services.supportdata.loadbalancer.server.port=3000

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.prod
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CKAN_BASE_URL: ${CKAN_BASE_URL}
      CKAN_API_KEY: ${CKAN_API_KEY}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-100}
      MAX_ROWS: ${MAX_ROWS:-200000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      DOWNLOAD_TIMEOUT: ${DOWNLOAD_TIMEOUT:-60}
    volumes:
      - tmpfiles:/tmp/ogd_files
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  tmpfiles:

networks:
  internal:
    driver: bridge
  proxy_net:
    external: true