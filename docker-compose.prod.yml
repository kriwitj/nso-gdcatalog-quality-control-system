version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ogd_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ogd_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: ogd_web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CKAN_BASE_URL: ${CKAN_BASE_URL}
      CKAN_API_KEY: ${CKAN_API_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    networks:
      - internal
      - external
    command: sh -c "npx prisma migrate deploy && node server.js"

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: ogd_worker
    restart: always
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CKAN_BASE_URL: ${CKAN_BASE_URL}
      CKAN_API_KEY: ${CKAN_API_KEY}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-100}
      MAX_ROWS: ${MAX_ROWS:-200000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      DOWNLOAD_TIMEOUT: ${DOWNLOAD_TIMEOUT:-60}
    volumes:
      - tmpfiles:/tmp/ogd_files
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: ogd_nginx
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - external

volumes:
  pgdata:
  redisdata:
  tmpfiles:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
